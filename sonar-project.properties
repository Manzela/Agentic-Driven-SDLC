# SonarCloud configuration for the Agentic-Driven SDLC Platform.
# Feature: spec-to-evidence-control / Task 22 (Phase-1 verification depth).
# Requirement: REQ-DEPTH-004 (SonarCloud quality gate on New Code).
# §3.6 same-repo-only: the SONAR_TOKEN secret is unavailable to fork PRs, so the
#   Sonar check runs (and gates) only on same-repo PRs — Semgrep is the fork backstop.
# §3.8 New-Code baseline: reference branch = main (seeded by the nightly CodeQL/Sonar run).

# Project identification.
sonar.projectKey=Manzela/Agentic-Driven-SDLC
sonar.projectName=Agentic-Driven SDLC Platform
sonar.sourceEncoding=UTF-8

# Quality gate: block the PR until the gate verdict is in, fail on a red gate.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# New-Code definition: a PR's New Code is measured against the main branch baseline (§3.8).
sonar.newCode.referenceBranch=main

# Source and test directories.
sonar.sources=tools,verification,src
sonar.tests=tests

# Exclusions: tools/ is exempt from the blocking gate (controlled debt, mirrors the
# orphan-detector tools/** forward-exempt). Documented for EXPIRY — once tools/ matures,
# drop this exclusion and address the findings.
sonar.exclusions=tools/**

# Coverage measurement scope (tests are not themselves coverage targets).
sonar.coverage.exclusions=tests/**,**/*_test.py
