name: traceability-gate

# Feature: spec-to-evidence-control / Task 40.4 (Phase-1 verification depth).
# REQ-6.3 (block on forward/backward orphans), REQ-6.2 (commit-trailer assertion).
# §3.4 merge-base self-test: fetch-depth:0, fail-closed on a shallow clone.
# §3.3 diff-aware orphan detection: forward (changed .py) + backward (model-delta),
#   tools/** forward-exempt via --exempt-paths. The Python gate (not OPA) is the
#   required leg here; the rego twin is proven separately by the conftest test.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, spec-reconciliation, platform-phases]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  traceability-gate:
    name: traceability-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff-aware orphan detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Merge-base self-test (§3.4): fail-closed if fetch-depth:0 was ignored. Fetch
      # origin/main first — actions/checkout does not guarantee the remote-tracking ref
      # exists on a PR checkout, and a missing ref would false-fail the self-test (and
      # block every PR) indistinguishably from a real shallow clone (red-team I5).
      - name: Merge-base reachability self-test
        run: |
          git fetch --no-tags --quiet origin main 2>/dev/null || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            echo "ERROR: fetch-depth:0 required — merge-base unreachable (shallow clone detected)" >&2
            exit 1
          fi
          echo "merge-base: $BASE"
          echo "BASELINE_COMMIT=$BASE" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet -r requirements.txt

      # Diff-aware orphan detection (§3.3): forward (changed .py, no req-id) + backward
      # (model-delta items lacking proof). Exits non-zero on any orphan -> blocks merge.
      # CI fail-CLOSED if the merge-base is unreachable (handled inside the detector).
      - name: Run orphan detector (diff-aware)
        run: |
          # feature_list.json is a RUNTIME artifact (not committed) — its absence is a
          # valid pre-delivery state, not a gate failure. Skip gracefully, mirroring
          # coverage-gate.yml, so the gate never blocks a PR for the model not existing
          # yet (red-team C1). When present, exit non-zero on any orphan blocks the merge.
          if [ ! -f feature_list.json ]; then
            echo "feature_list.json absent — pre-delivery state; skipping orphan gate."
            exit 0
          fi
          python tools/orphan_detector.py \
            --baseline-commit "${BASELINE_COMMIT}" \
            --exempt-paths "tools/**" \
            --feature-list feature_list.json

      # REQ-6.2: every non-merge feature commit this PR introduces must be traceable to
      # the spec — a requirement id (REQ-XXX-NNN) OR a task id (Task N), the two
      # conventions this repo actually uses (a REQ-only check would self-block this very
      # PR's "Task N:" commits — red-team I4). Revert/merge/fixup commits are exempt
      # (auto-generated, not feature work).
      - name: Assert commit-trailer requirement (REQ-6.2)
        run: |
          python - <<'PYTHON'
          import re
          import subprocess
          import sys

          base = "${{ env.BASELINE_COMMIT }}"
          out = subprocess.run(
              ["git", "rev-list", "--no-merges", f"{base}..HEAD"],
              capture_output=True, text=True, check=True,
          ).stdout.split()
          trace_re = re.compile(r"REQ-[A-Z]+-\d{3}|[Tt]ask\s+\d+")
          exempt_re = re.compile(r"^(Revert|Merge|fixup!|squash!|amend!)\b")
          offenders = []
          for sha in out:
              msg = subprocess.run(
                  ["git", "log", "-1", "--format=%B", sha],
                  capture_output=True, text=True, check=True,
              ).stdout
              subject = msg.strip().splitlines()[0] if msg.strip() else "<empty>"
              if exempt_re.match(subject):
                  continue
              if not trace_re.search(msg):
                  offenders.append(f"{sha[:8]} {subject}")
          if offenders:
              print("REQ-6.2 traceability: commit(s) missing a REQ-XXX-NNN / Task-N reference:")
              for o in offenders:
                  print(f"  - {o}")
              sys.exit(1)
          print(f"REQ-6.2: all {len(out)} checked PR commit(s) are traceable to the spec.")
          PYTHON
