name: Secrets Scan

# Feature: spec-to-evidence-control
# REQ-17.2 (REQ-SEC-002) — Property 32: CI Secrets Diff-Scan Blocks Merge (task 45 / 40.2).
#
# Merge-side half of "block the commit or merge": IF a secret is detected in a PR
# diff, THEN the `secrets-scan` REQUIRED status check FAILS and the merge is BLOCKED;
# for a clean diff it PASSES. The commit-side / pre-emission half is the distinct
# PreToolUse secret-block guard (REQ-17.5 / Property 20) — the two halves are split
# and neither is dropped.
#
# Scanner: gitleaks (canonical default; trufflehog is an acceptable alternative, not
# the default). Ruleset + false-positive allowlist live in the repo-root .gitleaks.toml.

on:
  # (a) Every PR scans the PR diff. Pushes to protected branches are also scanned so a
  # direct protected-branch push cannot bypass the gate.
  pull_request:
    branches: [main]
  push:
    branches: [main, spec-reconciliation, platform-phases]
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action lists PR commits via the API on pull_request events; without this
  # it 403s ("Resource not accessible by integration").
  pull-requests: read
  # Required so the SARIF report can be uploaded to GitHub code-scanning.
  security-events: write

jobs:
  secrets-scan:
    name: gitleaks secrets diff-scan (block merge on detected secret)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff-aware scan)
        uses: actions/checkout@v4
        with:
          # gitleaks-action needs full history to compute the PR diff range.
          fetch-depth: 0

      # (b) gitleaks is the canonical default scanner, pinned to the v2 action.
      # The action exits non-zero on any detected secret, which FAILS this REQUIRED
      # check and BLOCKS the merge (Property 32). GITLEAKS_ENABLE_COMMENTS posts a PR
      # comment on findings; the build failure — not the comment — is the gate.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # (c) Ruleset + known-false-positive allowlist.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # (d) Emit a SARIF report so findings are reviewable.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

      # (d) Upload the SARIF report as a build artifact (best-effort; the scan failure
      # above is the gate, so this step runs even when gitleaks failed).
      - name: Upload gitleaks SARIF report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif-report
          path: results.sarif
          if-no-files-found: ignore
