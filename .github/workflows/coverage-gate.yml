name: Coverage Gate

# Feature: spec-to-evidence-control
# Tasks: 14 (14.1 workflow / 14.2 required-status-check registration), 21 (full
#        zero-evidence policy). Requirements: 5.7, 10.3 — REQ-GATE-002 / REQ-GATE-003.
# Property: Property 22 (OPA Zero-Evidence Policy at Merge), design.md ~line 1613.
#
# WHAT THIS GATE DOES
# -------------------
# This job runs the PYTHON twin of the OPA/Conftest merge policy
# (`tools/coverage_gate.py:deny_merge`, the logical twin of
# `.github/policies/coverage_query.rego`). It imports the module and asserts that
# `deny_merge(feature_list.json)` does NOT deny the merge. If `feature_list.json`
# is absent — the normal state in this repository, where the coverage model is a
# RUNTIME artifact emitted by the control plane rather than a checked-in file — the
# gate SKIPS gracefully (passes) rather than failing on a missing input. Once a
# `feature_list.json` IS present (e.g. produced by `tools/feature_list_init.py` and
# committed/uploaded for a delivery PR), the gate becomes load-bearing: any in-scope
# item that is not `proven`-with-complete-evidence fails the check and blocks merge.
#
# The Python form is run here (instead of `conftest test feature_list.json
# --policy .github/policies/`) so the merge gate needs no OPA/Conftest runtime to be
# the REQUIRED status check; `coverage_query.rego` remains the canonical OPA twin and
# is exercised by its own conftest integration tests (tasks 21.3 / 26.1).
#
# REQUIRED STATUS CHECK
# ---------------------
# The job id `coverage-gate` is the REQUIRED status-check name registered in the
# GitHub repository ruleset (task 14.2 — the single canonical required-checks
# enumeration: formal-verification, coverage-gate, secrets-scan, audit-chain-verify,
# traceability-gate, zap-baseline, deepeval-gate). Registration is a ruleset
# operation performed outside this file (see docs/github-ruleset.md); keep the job id
# stable — renaming it silently un-registers the gate. NOTE: the Phase-0 stub was
# intentionally weaker than this Phase-1 full policy, so the required-check
# registration must be RE-confirmed after the stub->full swap; do not assume
# continuity (task 21.2).

on:
  # Run on PRs targeting main (the merge boundary the gate protects) and on direct
  # pushes to protected branches so a direct push cannot bypass the gate.
  pull_request:
    branches: [main]
  push:
    branches: [main, spec-reconciliation, platform-phases]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-gate:
    name: Zero-evidence coverage gate (block merge on un-proven coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Run the Python coverage gate. Imports tools/coverage_gate from the repo root
      # (the `tools` namespace package is importable with the repo root on sys.path),
      # locates feature_list.json, and asserts deny_merge does NOT deny.
      #   * feature_list.json ABSENT  -> SKIP gracefully (exit 0). The coverage model
      #                                  is a runtime artifact; its absence is a valid
      #                                  pre-delivery state, not a gate failure.
      #   * feature_list.json PRESENT -> assert `deny_merge(...)["deny"] is False`.
      #                                  Any deny reason fails the check (exit 1) and
      #                                  blocks the merge; reasons are printed.
      # The assertion fails CLOSED: a malformed feature_list.json makes deny_merge
      # return deny=True (handled inside the module), which fails this check.
      - name: Run Python coverage gate (deny_merge over feature_list.json)
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          # Repo root == GITHUB_WORKSPACE == the checkout cwd. Make the `tools`
          # namespace package importable.
          repo_root = Path.cwd().resolve()
          sys.path.insert(0, str(repo_root))

          from tools.coverage_gate import deny_merge  # noqa: E402

          # Locate the coverage model. Prefer repo root; fall back to a conventional
          # state/ location if the runtime emits it there.
          candidates = [
              repo_root / "feature_list.json",
              repo_root / "state" / "feature_list.json",
          ]
          path = next((p for p in candidates if p.is_file()), None)

          if path is None:
              print(
                  "coverage-gate: feature_list.json not present "
                  f"(looked in: {[str(c) for c in candidates]}). "
                  "The coverage model is a runtime artifact; its absence is a valid "
                  "pre-delivery state. Skipping gracefully (gate passes)."
              )
              sys.exit(0)

          print(f"coverage-gate: evaluating {path}")
          try:
              doc = json.loads(path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError) as exc:
              # Unreadable / malformed input -> fail CLOSED (REQ-GATE-005).
              print(f"coverage-gate: FAILED — could not load {path}: {exc}. Fail closed.")
              sys.exit(1)

          result = deny_merge(doc)
          if result["deny"]:
              print("coverage-gate: MERGE DENIED — zero-evidence policy violated:")
              for reason in result["reasons"]:
                  print(f"  - {reason}")
              sys.exit(1)

          print("coverage-gate: PASS — every in-scope item is proven with complete evidence.")
          sys.exit(0)
          PY

      # Evidence re-derivation + ledger cross-check (Phase A).
      # Consistent with the deny_merge step above, this step skips gracefully
      # when feature_list.json or dispatch_ledger.json is absent — both are
      # runtime artifacts whose absence is valid in the pre-delivery state.
      # ci_evidence_check.run() enforces this contract internally (exit 0 on
      # absent inputs); invoking it unconditionally is therefore safe.
      - name: Evidence re-derivation + ledger cross-check (Phase A)
        run: python3 tools/ci_evidence_check.py feature_list.json artifacts dispatch_ledger.json
